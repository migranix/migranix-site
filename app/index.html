<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Migranix — Data Cleaning Platform</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2563eb;--navy:#0f172a;--g200:#e5e7eb;--g500:#6b7280;--font:'DM Sans',sans-serif}
body{font-family:var(--font);background:#f8fafc;color:var(--navy);height:100vh;display:flex;flex-direction:column}

/* NAV BAR — matches main site */
.app-nav{
  height:56px;background:#fff;border-bottom:1px solid var(--g200);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.app-logo{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:700;color:var(--navy);text-decoration:none}
.app-logo-dot{width:9px;height:9px;background:var(--blue);border-radius:50%}
.app-badge{background:#eff6ff;color:var(--blue);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.05em;margin-left:8px}
.app-nav-right{display:flex;align-items:center;gap:16px}
.app-user{font-size:.82rem;color:var(--g500)}
.app-user strong{color:var(--navy)}
.app-btn{
  background:#fff;color:var(--blue);border:1.5px solid var(--blue);
  padding:6px 14px;border-radius:7px;font-size:.8rem;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:all .15s;text-decoration:none;
}
.app-btn:hover{background:#eff6ff}
.app-btn-danger{border-color:#dc2626;color:#dc2626}
.app-btn-danger:hover{background:#fef2f2}

/* IFRAME — fills remaining space */
.app-frame{flex:1;border:none;width:100%}

/* LOADING STATE */
.app-loading{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.app-loading .spinner{
  width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.app-loading p{color:var(--g500);font-size:.9rem}

/* LOGIN REQUIRED */
.login-box{
  max-width:420px;margin:60px auto;text-align:center;
  background:#fff;border-radius:16px;padding:44px 36px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid var(--g200);
}
.login-box h2{font-size:1.35rem;font-weight:700;margin:16px 0 8px}
.login-box p{color:var(--g500);font-size:.9rem;line-height:1.6;margin-bottom:24px}
.login-cta{
  display:inline-block;background:var(--blue);color:#fff;
  padding:13px 32px;border-radius:9px;font-weight:700;font-size:.95rem;
  text-decoration:none;transition:all .15s;
}
.login-cta:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,.3)}
.login-note{color:#9ca3af;font-size:.76rem;margin-top:16px}

/* Mobile */
@media(max-width:640px){
  .app-nav{padding:0 12px}
  .app-user{display:none}
  .app-badge{display:none}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="app-nav">
  <a class="app-logo" href="https://www.migranix.in">
    <svg viewBox="0 0 200 40" width="140" height="28" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="anb" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e40af"/><stop offset="50%" style="stop-color:#2563eb"/><stop offset="100%" style="stop-color:#3b82f6"/></linearGradient></defs>
      <rect x="0" y="2" width="36" height="36" rx="9" ry="9" fill="url(#anb)"/>
      <line x1="9" y1="29" x2="9" y2="11" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="9" y1="11" x2="18" y2="22" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="18" y1="22" x2="27" y2="11" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="27" y1="11" x2="27" y2="29" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="9" cy="29" r="2" fill="#fff"/><circle cx="18" cy="22" r="2" fill="#fff" opacity="0.85"/><circle cx="27" cy="29" r="2" fill="#fff"/>
      <text x="44" y="28" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Migranix</text>
    </svg>
    <span class="app-badge">PLATFORM</span>
  </a>
  <div class="app-nav-right" id="navRight">
    <span class="app-user" id="userDisplay"></span>
    <button class="app-btn app-btn-danger" id="logoutBtn" onclick="handleLogout()" style="display:none">Log Out</button>
  </div>
</nav>

<!-- CONTENT — switches between loading / login / app -->
<div class="app-loading" id="loadingState">
  <div class="spinner"></div>
  <p>Verifying your session...</p>
</div>

<!-- Branded loading screen while Streamlit wakes up -->
<div class="app-loading" id="appLoadingState" style="display:none">
  <svg viewBox="0 0 48 48" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e40af"/><stop offset="50%" style="stop-color:#2563eb"/><stop offset="100%" style="stop-color:#3b82f6"/></linearGradient></defs>
    <rect width="48" height="48" rx="12" fill="url(#lg)"/>
    <line x1="12" y1="36" x2="12" y2="14" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="12" y1="14" x2="24" y2="28" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="24" y1="28" x2="36" y2="14" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="36" y1="14" x2="36" y2="36" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
    <circle cx="12" cy="36" r="2.5" fill="#fff"/><circle cx="24" cy="28" r="2.5" fill="#fff" opacity="0.85"/><circle cx="36" cy="36" r="2.5" fill="#fff"/>
  </svg>
  <div style="margin-top:16px;text-align:center">
    <p style="font-size:1.1rem;font-weight:600;color:#0f172a;margin-bottom:6px">Migranix Platform</p>
    <p style="color:#64748b;font-size:.875rem" id="loadingMsg">Preparing your workspace...</p>
    <div style="width:200px;height:4px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:16px auto 0">
      <div id="loadBar" style="width:0%;height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:99px;transition:width 1s ease"></div>
    </div>
  </div>
</div>

<div class="login-box" id="loginState" style="display:none">
  <div style="font-size:2rem;margin-bottom:8px">🔒</div>
  <h2>Login Required</h2>
  <p>You need to sign in to access the Migranix Data Platform.<br>Log in on our website, then come back here.</p>
  <a class="login-cta" href="https://www.migranix.in">Go to migranix.in →</a>
  <div class="login-note">Free 14-day trial · No credit card required</div>
</div>

<iframe class="app-frame" id="appFrame" style="display:none" allow="clipboard-read; clipboard-write; cross-origin-isolated" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads allow-top-navigation"></iframe>

<script>
var SUPA_URL='https://yxwlgwaalghvskulhmey.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4d2xnd2FhbGdodnNrdWxobWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODEwODYsImV4cCI6MjA5NDQ1NzA4Nn0.QOZphIHDIebIkSX23LPjQXtr-iICT9dapzYMw11HBTw';
var sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);

/* ── 10-second window-close timeout ────────────────────────────── */
var CLOSE_TIMEOUT=10*1000;
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='hidden') localStorage.setItem('mx_left_at',Date.now().toString());
  if(document.visibilityState==='visible'){
    var left=localStorage.getItem('mx_left_at');
    if(left&&(Date.now()-parseInt(left))>CLOSE_TIMEOUT){
      localStorage.clear(); sb.auth.signOut(); window.location.href='https://www.migranix.in';
    }
    localStorage.removeItem('mx_left_at');
  }
});

var STREAMLIT_URL='https://migranix-app.onrender.com';

/* ── Loading progress messages ─────────────────────────────────── */
var loadMsgs=['Preparing your workspace...','Connecting to data engine...','Almost ready...','Loading platform...'];
var loadPct=[15,40,65,85];

function animateLoading(){
  var bar=document.getElementById('loadBar');
  var msg=document.getElementById('loadingMsg');
  var step=0;
  function next(){
    if(step<loadMsgs.length){
      msg.textContent=loadMsgs[step];
      bar.style.width=loadPct[step]+'%';
      step++;
      setTimeout(next,2000+Math.random()*2000);
    }
  }
  next();
}

/* ── Poll Streamlit until it responds, then show iframe ────────── */
function waitForStreamlit(frameEl,appLoadEl){
  var attempts=0;
  var maxAttempts=60; // 60 attempts × 3 seconds = 3 minutes max wait
  animateLoading();

  var poll=setInterval(function(){
    attempts++;
    fetch(STREAMLIT_URL+'/_stcore/health',{mode:'no-cors'})
      .then(function(){
        // Streamlit responded — it's ready
        clearInterval(poll);
        var bar=document.getElementById('loadBar');
        var msg=document.getElementById('loadingMsg');
        bar.style.width='100%';
        msg.textContent='Ready!';
        setTimeout(function(){
          appLoadEl.style.display='none';
          frameEl.style.display='';
        },600);
      })
      .catch(function(){
        // Still loading — update message
        if(attempts>20){
          var msg=document.getElementById('loadingMsg');
          msg.textContent='Starting up the platform (first load takes ~30s)...';
        }
      });
    if(attempts>=maxAttempts){
      clearInterval(poll);
      // Give up waiting — just show the iframe anyway
      appLoadEl.style.display='none';
      frameEl.style.display='';
    }
  },3000);
}

async function init(){
  var loadEl=document.getElementById('loadingState');
  var appLoadEl=document.getElementById('appLoadingState');
  var loginEl=document.getElementById('loginState');
  var frameEl=document.getElementById('appFrame');
  var userEl=document.getElementById('userDisplay');
  var logoutEl=document.getElementById('logoutBtn');

  // Check if window was closed >10 seconds
  var left=localStorage.getItem('mx_left_at');
  if(left&&(Date.now()-parseInt(left))>CLOSE_TIMEOUT){
    localStorage.clear(); await sb.auth.signOut();
    loadEl.style.display='none'; loginEl.style.display='block'; return;
  }

  try{
    var sess=await sb.auth.getSession();
    var user=sess.data.session?sess.data.session.user:null;
    var token=sess.data.session?sess.data.session.access_token:'';

    if(!user){
      loadEl.style.display='none'; loginEl.style.display='block'; return;
    }

    // Logged in — show branded loading, start polling
    var name=user.user_metadata?user.user_metadata.full_name||user.email:user.email;
    userEl.innerHTML='<strong>'+name+'</strong>';
    logoutEl.style.display='';
    loadEl.style.display='none';
    appLoadEl.style.display='flex';

    // Set iframe src (starts loading in background)
    frameEl.src=STREAMLIT_URL+'/?token='+token;

    // Wait for Streamlit to be ready, then reveal
    waitForStreamlit(frameEl,appLoadEl);

  }catch(e){
    console.error('Auth error:',e);
    loadEl.style.display='none'; loginEl.style.display='block';
  }

  sb.auth.onAuthStateChange(function(event,session){
    if(event==='SIGNED_OUT'){
      frameEl.style.display='none'; loginEl.style.display='block';
      logoutEl.style.display='none'; userEl.innerHTML='';
    }
  });
}

async function handleLogout(){
  await sb.auth.signOut();
  localStorage.clear();
  window.location.href='https://www.migranix.in';
}

init();
</script>
</body>
</html>
